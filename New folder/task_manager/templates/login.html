{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login | DevFlow</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="form-container">
        <h2 style="text-align: center;">🔓 Login</h2>
        
        {% if error %}
        <p style="color: var(--danger); text-align: center; font-size: 0.9rem;">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="admin or username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>
        <p style="text-align: center; margin-top: 20px;">
            New user? <a href="{% url 'register' %}">Create account</a>
        </p>
    </div>
</body>
</html>
